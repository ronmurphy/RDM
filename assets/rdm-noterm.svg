<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="fs" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000058"/>
    </filter>
  </defs>

  <!-- ── Isometric cube (muted — the folder/terminal is the focal point) ── -->
  <!-- Top face -->
  <polygon points="256,104 134,178 256,252 378,178" fill="#8C3018"/>
  <line x1="256" y1="104" x2="378" y2="178" stroke="#A84830" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="104" x2="134" y2="178" stroke="#7A2810" stroke-width="2"   stroke-linecap="round"/>

  <!-- Left face -->
  <polygon points="134,178 256,252 256,408 134,334" fill="#6A2010"/>
  <polygon points="134,178 256,252 256,270 134,196" fill="#FFFFFF12"/>
  <line x1="134" y1="334" x2="256" y2="408" stroke="#4A1608" stroke-width="2"/>

  <!-- Right face -->
  <polygon points="256,252 378,178 378,334 256,408" fill="#4E1808"/>
  <polygon points="256,384 378,310 378,334 256,408" fill="#00000028"/>
  <line x1="378" y1="334" x2="256" y2="408" stroke="#321008" stroke-width="2"/>

  <!-- Seam edges -->
  <line x1="256" y1="252" x2="256" y2="408" stroke="#3C1208" stroke-width="2"/>
  <line x1="134" y1="178" x2="134" y2="334" stroke="#5A1C0C" stroke-width="1.5"/>
  <line x1="378" y1="178" x2="378" y2="334" stroke="#301008" stroke-width="1.5"/>

  <!-- ── Folder back + tab ── -->
  <path d="M 138,246 L 138,212 Q 138,198 152,198 L 226,198
           Q 240,198 246,212 L 260,246 Z"
        fill="#B87016"/>
  <rect x="130" y="242" width="258" height="10" fill="#B87016"/>

  <!-- Folder front face -->
  <rect x="122" y="246" width="272" height="188" rx="13" fill="#E8A030" filter="url(#fs)"/>

  <!-- Interior: dark terminal background -->
  <rect x="138" y="264" width="240" height="156" rx="7" fill="#1E1E2E"/>

  <!-- Terminal prompt chevron ">" -->
  <polyline points="162,296 202,328 162,360"
            fill="none" stroke="#A6E3A1" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore / cursor -->
  <line x1="220" y1="364" x2="288" y2="364"
        stroke="#A6E3A1" stroke-width="12" stroke-linecap="round"/>

  <!-- Blinking cursor block -->
  <rect x="292" y="344" width="13" height="24" rx="2" fill="#A6E3A1" opacity="0.75"/>
</svg>
