<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="gs" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000060"/>
    </filter>
  </defs>

  <!-- ── Isometric cube ── -->
  <!-- Top face -->
  <polygon points="256,104 134,178 256,252 378,178" fill="#D05828"/>
  <line x1="256" y1="104" x2="378" y2="178" stroke="#E87248" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="104" x2="134" y2="178" stroke="#C04820" stroke-width="2"   stroke-linecap="round"/>

  <!-- Left face -->
  <polygon points="134,178 256,252 256,408 134,334" fill="#A83A1A"/>
  <!-- subtle ambient strip -->
  <polygon points="134,178 256,252 256,272 134,198" fill="#FFFFFF14"/>
  <line x1="134" y1="334" x2="256" y2="408" stroke="#7A2212" stroke-width="2"/>

  <!-- Right face -->
  <polygon points="256,252 378,178 378,334 256,408" fill="#782010"/>
  <!-- shadow strip at base -->
  <polygon points="256,384 378,310 378,334 256,408" fill="#00000030"/>
  <line x1="378" y1="334" x2="256" y2="408" stroke="#4E1408" stroke-width="2"/>

  <!-- Seam edges -->
  <line x1="256" y1="252" x2="256" y2="408" stroke="#5C1A0C" stroke-width="2"/>
  <line x1="134" y1="178" x2="134" y2="334" stroke="#7A2A12" stroke-width="1.5"/>
  <line x1="378" y1="178" x2="378" y2="334" stroke="#4A1208" stroke-width="1.5"/>

  <!-- ── Gear (8 teeth, fill-rule evenodd punches the centre hole) ──
       Centre (256, 302)  outer_r=72  valley_r=57  hole_r=26           -->
  <path fill-rule="evenodd" fill="white" filter="url(#gs)"
    d="M 256,230
       L 278,248  L 307,251  L 309,280
       L 328,302  L 309,324  L 307,353
       L 278,356  L 256,374
       L 234,356  L 205,353  L 203,324
       L 184,302  L 203,280  L 205,251
       L 234,248  Z
       M 256,276 A 26,26 0 0,1 282,302 A 26,26 0 0,1 256,328
                 A 26,26 0 0,1 230,302 A 26,26 0 0,1 256,276 Z"/>
</svg>
