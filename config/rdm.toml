# RDM Desktop Configuration

schema_version = 1

[appearance]
theme = "tokyo-night"

[panel]
height = 32
position = "top"
show_clock = true
show_workspaces = true
clock_format = "%H:%M  %b %d"

[launcher]
width = 500
height = 400
ui_mode = "winxp_classic"

[snap]
edge_threshold = 20
show_preview = true

[idle]
enabled = true
screen_off_secs = 300           # 5 minutes — blank screen, any input wakes it
lock_timeout_secs = 600         # 10 minutes — lock screen (0 = no auto-lock)
lock_before_sleep = true        # lock before suspend/sleep
idle_inhibit_on_audio = true    # don't blank screen while audio/video is playing

# ── Panel Plugins ──────────────────────────────────────────────

[[panel.plugins]]
name     = "clipboard"
position = "right"

[[panel.plugins]]
name     = "sysmon"
position = "right"
