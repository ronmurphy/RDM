# RDM Desktop Configuration

schema_version = 1

[appearance]
theme = "tokyo-night"

[panel]
height = 32
position = "top"
show_clock = true
show_workspaces = true
clock_format = "%H:%M  %b %d"

[launcher]
width = 500
height = 400
ui_mode = "winxp_classic"

[snap]
edge_threshold = 20
show_preview = true
