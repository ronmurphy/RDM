# RDM Session - Autostart entries
# restart = true means the session manager will relaunch if it crashes

[[autostart]]
name = "rdm-watermark"
command = "rdm-watermark"
args = []
restart = true

[[autostart]]
name = "rdm-panel"
command = "rdm-panel"
args = []
restart = true

[[autostart]]
name = "rdm-notify"
command = "rdm-notify"
args = []
restart = true

#[[autostart]]
#name = "rdm-dock"
#command = "rdm-dock"
#args = []
#restart = true

[[autostart]]
name = "swaybg"
command = "swaybg"
args = ["-c", "#1a1b26"]
restart = false

[[autostart]]
name = "swayidle"
command = "swayidle"
args = []
restart = true

[[autostart]]
name = "rdm-idle-inhibit"
command = "rdm-idle-inhibit"
args = []
restart = true

[[autostart]]
name = "polkit-gnome"
command = "/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1"
args = []
restart = true

